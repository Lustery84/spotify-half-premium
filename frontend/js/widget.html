<html lang="en">
<head>

    <style>
        :root {
            --accent-color: #00ff88;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            background: transparent; /* Bắt buộc */
        }
        .mini-widget-player {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            height: 80px;
            background: rgba(15, 15, 22, 0.75); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            color: white;
            user-select: none;
        }

    </style>
</head>
<body>

        </div>

</html>
